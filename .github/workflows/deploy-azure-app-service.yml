name: Deploy Lucky5 To Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: lucky5-azure-production
  cancel-in-progress: true

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
  AZURE_ACR_LOGIN_SERVER: ${{ vars.AZURE_ACR_LOGIN_SERVER }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
  LUCKY5_IMAGE_NAME: lucky5

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required GitHub Actions variables
        shell: bash
        run: |
          set -euo pipefail
          required_vars=(
            AZURE_CLIENT_ID
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            AZURE_RESOURCE_GROUP
            AZURE_WEBAPP_NAME
            AZURE_ACR_NAME
            AZURE_ACR_LOGIN_SERVER
            AZURE_LOCATION
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required repository variable: ${name}" >&2
              exit 1
            fi
          done

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        shell: bash
        run: |
          set -euo pipefail
          az acr login --name "${AZURE_ACR_NAME}"

      - name: Build container image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --file Dockerfile \
            --tag "${AZURE_ACR_LOGIN_SERVER}/${LUCKY5_IMAGE_NAME}:${GITHUB_SHA}" \
            --tag "${AZURE_ACR_LOGIN_SERVER}/${LUCKY5_IMAGE_NAME}:latest" \
            .

      - name: Push container image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${AZURE_ACR_LOGIN_SERVER}/${LUCKY5_IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${AZURE_ACR_LOGIN_SERVER}/${LUCKY5_IMAGE_NAME}:latest"

      - name: Ensure App Service uses managed identity for ACR pulls
        shell: bash
        run: |
          set -euo pipefail

          az webapp identity assign \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_WEBAPP_NAME}" \
            --output none

          az webapp config set \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_WEBAPP_NAME}" \
            --acr-use-identity true \
            --acr-identity [system] \
            --always-on true \
            --web-sockets-enabled true \
            --output none

      - name: Ensure Lucky5 runtime settings are present
        shell: bash
        run: |
          set -euo pipefail
          az webapp config appsettings set \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_WEBAPP_NAME}" \
            --settings \
              "WEBSITES_PORT=8080" \
              "PORT=8080" \
              "WEBSITES_ENABLE_APP_SERVICE_STORAGE=false" \
              "ASPNETCORE_ENVIRONMENT=Production" \
              "CORS__ALLOWED_ORIGINS=https://${AZURE_WEBAPP_NAME}.azurewebsites.net" \
            --output none

      - name: Point App Service at the new image
        shell: bash
        run: |
          set -euo pipefail
          az webapp config container set \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_WEBAPP_NAME}" \
            --container-image-name "${AZURE_ACR_LOGIN_SERVER}/${LUCKY5_IMAGE_NAME}:${GITHUB_SHA}" \
            --output none

          az webapp restart \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${AZURE_WEBAPP_NAME}" \
            --output none

      - name: Smoke check deployed health endpoint
        shell: bash
        run: |
          set -euo pipefail
          health_url="https://${AZURE_WEBAPP_NAME}.azurewebsites.net/health/live"

          for _ in $(seq 1 30); do
            if curl --fail --silent --show-error "${health_url}" >/dev/null; then
              echo "Health check passed at ${health_url}"
              exit 0
            fi
            sleep 10
          done

          echo "Health check failed for ${health_url}" >&2
          exit 1
