name: Deploy Lucky5 To Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lucky5-firebase-production
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.29.2"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Flutter dependencies
        working-directory: client
        run: flutter pub get

      - name: Build Flutter web app
        working-directory: client
        run: flutter build web --release

      - name: Deploy to Firebase Hosting        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LUCKY5_V7 }}
          projectId: lucky5-v7
          channelId: live
