# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - lucky5-ik90-prod-20260401

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: lucky520260401001454.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_26D3D00CDD3941DFB96435071A1F8C55 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_D0DC2346663945028B3B364FD3EC7C5B }}

      - name: Build and test
        run: |
          dotnet build server/Lucky5.sln -v minimal
          dotnet run --project server/tests/Lucky5.Tests/Lucky5.Tests.csproj

      - name: Run RTP simulation gate (10K rounds)
        run: |
          dotnet run --project server/src/Lucky5.Simulation/Lucky5.Simulation.csproj -- --rounds 10000 --min-rtp 0.78 --max-rtp 0.82

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: lucky520260401001454.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_26D3D00CDD3941DFB96435071A1F8C55 }}/lucky5:${{ github.sha }}
          file: ./Dockerfile

  deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_509BA27B85154A28AAC461B2F8B3B2B9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B57D6E4570DC49A7B778A42C36EFA6BB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3516A63C82874F18AB48F2180EBAC38A }}

      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'lucky5-ik90-prod-20260401'
          slot-name: 'staging'
          images: 'lucky520260401001454.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_26D3D00CDD3941DFB96435071A1F8C55 }}/lucky5:${{ github.sha }}'

      - name: Wait for staging deployment
        run: sleep 60

      - name: Simple health check staging
        run: |
          health_url="https://lucky5-ik90-prod-20260401-staging.azurewebsites.net/health/simple"
          echo "Checking simple health endpoint: ${health_url}"
          
          for i in $(seq 1 60); do
            echo "Attempt $i: Checking simple health endpoint..."
            if curl --fail --silent --show-error --max-time 30 --connect-timeout 10 "${health_url}" >/dev/null 2>&1; then
              echo "Simple health check passed at ${health_url}"
              echo "Application is responding and ready"
              exit 0
            fi
            
            if [ $i -eq 10 ] || [ $i -eq 30 ] || [ $i -eq 45 ]; then
              echo "Still waiting for application to start... (attempt $i/60)"
            fi
            
            sleep 10
          done
          
          echo "Simple health check failed after 60 attempts" >&2
          echo "Application may not be starting properly" >&2
          exit 1

  certification:
    runs-on: ubuntu-latest
    needs: deploy-staging
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Run certification simulation (500K rounds)
        run: |
          dotnet run --project server/src/Lucky5.Simulation/Lucky5.Simulation.csproj -- --certification --min-rtp 0.78 --max-rtp 0.82

  production-swap:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: certification
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_509BA27B85154A28AAC461B2F8B3B2B9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B57D6E4570DC49A7B778A42C36EFA6BB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3516A63C82874F18AB48F2180EBAC38A }}

      - name: Swap staging to production
        uses: azure/cli@v1
        with:
          inlineScript: |
            az webapp deployment slot swap --resource-group lucky5-ik90-prod-20260401-rg --name lucky5-ik90-prod-20260401 --slot staging --target-slot production

      - name: Simple health check production
        run: |
          health_url="https://lucky5-ik90-prod-20260401.azurewebsites.net/health/simple"
          echo "Checking simple health endpoint: ${health_url}"
          
          for i in $(seq 1 60); do
            echo "Attempt $i: Checking simple health endpoint..."
            if curl --fail --silent --show-error --max-time 30 --connect-timeout 10 "${health_url}" >/dev/null 2>&1; then
              echo "Simple health check passed at ${health_url}"
              echo "Application is responding and ready"
              exit 0
            fi
            
            if [ $i -eq 10 ] || [ $i -eq 30 ] || [ $i -eq 45 ]; then
              echo "Still waiting for application to start... (attempt $i/60)"
            fi
            
            sleep 10
          done
          
          echo "Simple health check failed after 60 attempts" >&2
          echo "Application may not be starting properly" >&2
          exit 1

      - name: Cleanup staging slot
        uses: azure/cli@v1
        with:
          inlineScript: |
            az webapp deployment slot delete --resource-group lucky5-ik90-prod-20260401-rg --name lucky5-ik90-prod-20260401 --slot staging
