openapi: 3.1.0
info:
  title: Lucky5 Clean-Room API
  version: 1.0.0
  description: >
    Contract-first clean-room API for Lucky5 bankroll poker (local/staging phase).
servers:
  - url: http://localhost:5051
    description: Local API
tags:
  - name: Auth
  - name: Game
  - name: General
security:
  - bearerAuth: []
paths:
  /api/Auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login with username/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfLoginPayload'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/Auth/signup:
    post:
      tags: [Auth]
      security: []
      summary: Create account and issue OTP challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfMemberProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/Auth/verify-otp:
    post:
      tags: [Auth]
      security: []
      summary: Verify OTP challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          $ref: '#/components/responses/ApiResponseSuccessFlag'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/Auth/resend-otp:
    post:
      tags: [Auth]
      security: []
      summary: Resend OTP challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendOtpRequest'
      responses:
        '200':
          $ref: '#/components/responses/ApiResponseSuccessFlag'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/Auth/GetUserById:
    get:
      tags: [Auth]
      summary: Get profile for current authenticated user
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfMemberProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/Auth/MemberHistory:
    get:
      tags: [Auth]
      summary: Get wallet history
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfWalletLedgerEntryArray'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/Auth/TransferBalance:
    post:
      tags: [Auth]
      summary: Transfer balance operation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfWalletLedgerEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/Auth/MoveWinToBalance:
    post:
      tags: [Auth]
      summary: Move winnings to wallet balance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfWalletLedgerEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/Auth/UpdateCredit:
    post:
      tags: [Auth]
      summary: Adjust account credit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfWalletLedgerEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/Auth/logout:
    post:
      tags: [Auth]
      summary: Revoke access token
      responses:
        '200':
          $ref: '#/components/responses/ApiResponseSuccessFlag'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/Game/games:
    get:
      tags: [Game]
      summary: List game families
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfStringArray'
  /api/Game/games/machines:
    get:
      tags: [Game]
      summary: List machine offerings
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfMachineListingArray'
  /api/Game/games/machines/{machineId}:
    get:
      tags: [Game]
      summary: Get full machine configuration snapshot
      parameters:
        - name: machineId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfMachineConfig'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/Game/cards:
    get:
      tags: [Game]
      summary: Get card dictionary
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfCardDictionary'
  /api/Game/defaultRules:
    get:
      tags: [Game]
      summary: Get payout/default rules
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfDefaultRules'
  /api/Game/offer:
    get:
      tags: [Game]
      summary: Get active offers
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfOfferArray'
  /api/Game/machine/{machine_id}/cabinet-snapshot:
    get:
      tags: [Game]
      summary: Get authoritative Godot cabinet snapshot
      parameters:
        - name: machine_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfCabinetSnapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/Game/cards/deal:
    post:
      tags: [Game]
      summary: Start round and deal opening hand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DealRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfDealResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/Game/cards/draw:
    post:
      tags: [Game]
      summary: Resolve held/drawn cards for current round
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DrawRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfDrawResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/Game/double-up:
    post:
      tags: [Game]
      summary: Resolve double-up command
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoubleUpRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfRewardStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/General/app-settings:
    get:
      tags: [General]
      security: []
      summary: Get app settings dictionary
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfStringMap'
  /api/General/contact-info:
    get:
      tags: [General]
      security: []
      summary: Get support contact information
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfStringMap'
  /api/General/contact-types:
    get:
      tags: [General]
      security: []
      summary: Get support contact categories
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfContactTypeArray'
  /api/General/contact-report:
    post:
      tags: [General]
      summary: Submit support report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactReportRequest'
      responses:
        '200':
          $ref: '#/components/responses/ApiResponseSuccessFlag'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/General/terms:
    get:
      tags: [General]
      security: []
      summary: Get latest terms document
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseOfTermsResponse'

  /CarrePokerGameHub/negotiate:
    post:
      tags: [Game]
      summary: SignalR negotiate endpoint
      description: Provided by ASP.NET SignalR middleware.
      requestBody:
        required: false
      responses:
        '200':
          description: Negotiate success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NegotiateResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequest:
      description: Validation or command failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseOfAny'
    Unauthorized:
      description: Missing or invalid auth
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseOfAny'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseOfAny'
    ApiResponseSuccessFlag:
      description: Success wrapper for command-style endpoints
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseOfSuccessFlag'
  schemas:
    ApiResponseBase:
      type: object
      required: [success, message, errors, traceId]
      properties:
        success:
          type: boolean
        message:
          type: string
        errors:
          type: array
          items:
            type: string
        traceId:
          type: string
    ApiResponseOfAny:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data: {}
    ApiResponseOfSuccessFlag:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              type: object
              properties:
                verified:
                  type: boolean
                resent:
                  type: boolean
                loggedOut:
                  type: boolean
                submitted:
                  type: boolean
    ApiResponseOfLoginPayload:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              type: object
              required: [tokens, profile]
              properties:
                tokens:
                  $ref: '#/components/schemas/AuthTokens'
                profile:
                  $ref: '#/components/schemas/MemberProfile'
    ApiResponseOfMemberProfile:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MemberProfile'
    ApiResponseOfMachineListingArray:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/MachineListing'
    ApiResponseOfMachineConfig:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MachineConfig'
    ApiResponseOfCardDictionary:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/CardDictionaryEntry'
    ApiResponseOfDefaultRules:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DefaultRules'
    ApiResponseOfDealResult:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DealResult'
    ApiResponseOfDrawResult:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DrawResult'
    ApiResponseOfRewardStatus:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RewardStatus'
    ApiResponseOfWalletLedgerEntry:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/WalletLedgerEntry'
    ApiResponseOfWalletLedgerEntryArray:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/WalletLedgerEntry'
    ApiResponseOfOfferArray:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Offer'
    ApiResponseOfCabinetSnapshot:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CabinetSnapshot'
    ApiResponseOfContactTypeArray:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ContactType'
    ApiResponseOfTermsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/TermsResponse'
    ApiResponseOfStringMap:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              type: object
              additionalProperties:
                type: string
    ApiResponseOfStringArray:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              type: array
              items:
                type: string

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    SignupRequest:
      type: object
      required: [username, password, phoneNumber]
      properties:
        username:
          type: string
        password:
          type: string
        phoneNumber:
          type: string
    VerifyOtpRequest:
      type: object
      required: [username, otpCode]
      properties:
        username:
          type: string
        otpCode:
          type: string
    ResendOtpRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
    TransferRequest:
      type: object
      required: [amount, reference, direction]
      properties:
        amount:
          type: number
          format: decimal
        reference:
          type: string
        direction:
          type: string
    ContactReportRequest:
      type: object
      required: [contactTypeId, subject, message]
      properties:
        contactTypeId:
          type: integer
          format: int32
        subject:
          type: string
        message:
          type: string
    DealRequest:
      type: object
      required: [machineId, betAmount]
      properties:
        machineId:
          type: integer
          format: int32
        betAmount:
          type: number
          format: decimal
    DrawRequest:
      type: object
      required: [roundId, holdIndexes]
      properties:
        roundId:
          type: string
          format: uuid
        holdIndexes:
          type: array
          items:
            type: integer
            format: int32
    DoubleUpRequest:
      type: object
      required: [roundId, guess]
      properties:
        roundId:
          type: string
          format: uuid
        guess:
          type: string
          enum: [big, small]

    AuthTokens:
      type: object
      required: [accessToken, refreshToken, expiresAt]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time
    MemberProfile:
      type: object
      required: [userId, username, displayName, phoneNumber, walletBalance, lastSeenUtc]
      properties:
        userId:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
          nullable: true
        phoneNumber:
          type: string
        walletBalance:
          type: number
          format: decimal
        lastSeenUtc:
          type: string
          format: date-time
    MachineListing:
      type: object
      required: [id, name, isOpen, minBet, maxBet]
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        isOpen:
          type: boolean
        minBet:
          type: number
          format: decimal
        maxBet:
          type: number
          format: decimal
    MachineConfig:
      type: object
      required: [machineId, gameId, machineName, minBetAmount, maxBetAmount, active, ready]
      properties:
        machineId:
          type: integer
          format: int32
        gameId:
          type: integer
          format: int32
        machineName:
          type: string
        minBetAmount:
          type: number
          format: decimal
        maxBetAmount:
          type: number
          format: decimal
        machineAmount:
          type: number
          format: decimal
        currentUserAmount:
          type: number
          format: decimal
        openAmount:
          type: number
          format: decimal
        counterStatus:
          type: boolean
        active:
          type: boolean
        ready:
          type: boolean
        openedDoubleUpPercentage:
          type: number
          format: decimal
        closedDoubleUpPercentage:
          type: number
          format: decimal
        autoOpenClosePercentage:
          type: number
          format: decimal
        carreIndex:
          type: integer
          format: int32
        currentMemberId:
          type: integer
          format: int32
          nullable: true
        profit:
          type: number
          format: decimal
        winBonusDefaultPokerRulesId:
          type: integer
          format: int32
        winBonusAmount:
          type: number
          format: decimal
        maxStraightFlush:
          type: number
          format: decimal
        maxCarre1:
          type: number
          format: decimal
        maxCarre2:
          type: number
          format: decimal
        maxFullHouse:
          type: number
          format: decimal
        maxKent:
          type: number
          format: decimal
        minStraightFlush:
          type: number
          format: decimal
        minCarre1:
          type: number
          format: decimal
        minCarre2:
          type: number
          format: decimal
        minFullHouse:
          type: number
          format: decimal
        minKent:
          type: number
          format: decimal
        currentStraightFlush:
          type: number
          format: decimal
        currentCarre1:
          type: number
          format: decimal
        currentCarre2:
          type: number
          format: decimal
        currentFullHouse:
          type: number
          format: decimal
        currentKent:
          type: number
          format: decimal
        kentRounds:
          type: integer
          format: int32
        doubleUpLimit:
          type: number
          format: decimal
        fullHouseCardId:
          type: integer
          format: int32
        firstRechargeCredit:
          type: number
          format: decimal
        firstRechargeBonus:
          type: number
          format: decimal
        secondRechargeCredit:
          type: number
          format: decimal
        secondRechargeBonus:
          type: number
          format: decimal
    CardDictionaryEntry:
      type: object
      required: [cardId, title, suit, rank]
      properties:
        cardId:
          type: integer
          format: int32
        title:
          type: string
        suit:
          type: string
        rank:
          type: string
    HandResult:
      type: object
      required: [handRank, description, winAmount, isWin, canWin]
      properties:
        handRank:
          type: integer
          format: int32
        description:
          type: string
        winAmount:
          type: number
          format: decimal
        isWin:
          type: boolean
        canWin:
          type: boolean
    DefaultRules:
      type: object
      required: [payoutMultipliers]
      properties:
        payoutMultipliers:
          type: object
          additionalProperties:
            type: number
            format: decimal
    PokerCard:
      type: object
      required: [cardId, title, suit, rank]
      properties:
        cardId:
          type: integer
          format: int32
        title:
          type: string
        suit:
          type: string
        rank:
          type: string
        code:
          type: string
          nullable: true
    CabinetSnapshot:
      type: object
      required:
        - schema_version
        - state_version
        - session_id
        - machine_id
        - variant_id
        - game_state
        - hand
        - evaluation
        - double_up
        - credits
        - jackpot
        - ui_hints
        - timestamp
        - sequence_number
      properties:
        schema_version:
          type: string
          enum: [v1]
        state_version:
          type: integer
          format: int64
        session_id:
          type: string
          format: uuid
          nullable: true
        machine_id:
          type: integer
          format: int32
        variant_id:
          type: string
        game_state:
          type: string
          enum: [idle, dealing, drawn, double_up, complete, closed, recovery]
        hand:
          $ref: '#/components/schemas/CabinetHand'
        evaluation:
          $ref: '#/components/schemas/CabinetEvaluation'
        double_up:
          $ref: '#/components/schemas/CabinetDoubleUp'
        credits:
          $ref: '#/components/schemas/CabinetCredits'
        jackpot:
          $ref: '#/components/schemas/CabinetJackpot'
        ui_hints:
          $ref: '#/components/schemas/CabinetUiHints'
        timestamp:
          type: string
          format: date-time
        sequence_number:
          type: integer
          format: int64
    CabinetHand:
      type: object
      required: [cards, held, result_cards]
      properties:
        cards:
          type: array
          items:
            $ref: '#/components/schemas/PokerCard'
        held:
          type: array
          items:
            type: integer
            format: int32
        result_cards:
          type: array
          items:
            $ref: '#/components/schemas/PokerCard'
    CabinetEvaluation:
      type: object
      required: [hand_rank, payout_multiplier, win_amount]
      properties:
        hand_rank:
          type: string
        payout_multiplier:
          type: number
          format: decimal
        win_amount:
          type: number
          format: decimal
    CabinetDoubleUp:
      type: object
      required: [active, card_revealed, outcome, switches_remaining, is_no_lose_active, card_trail]
      properties:
        active:
          type: boolean
        card_revealed:
          type: boolean
        outcome:
          type: string
        dealer_card:
          $ref: '#/components/schemas/PokerCard'
          nullable: true
        challenger_card:
          $ref: '#/components/schemas/PokerCard'
          nullable: true
        switches_remaining:
          type: integer
          format: int32
