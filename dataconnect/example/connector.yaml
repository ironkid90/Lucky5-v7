connectorId: example
generate:
  dartSdk:
    - outputDir: ..\..\client\lib\dataconnect_generated
      package: dataconnect_generated/generated.dart
      clientCache: {}
  javascriptSdk:
    - outputDir: ..\..\mobile\src\dataconnect-generated
      package: "@dataconnect/generated"
      packageJsonDir: ..\..\mobile
      react: false
      angular: false
      clientCache: {}
    - outputDir: ..\..\src\web\src\dataconnect-generated
      package: "@dataconnect/generated"
      packageJsonDir: ..\..\src\web
      react: true
      angular: false
      clientCache: {}
